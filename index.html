<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Interativa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Convidados</h1>
        
        <div class="input-group">
            <input type="text" id="nome-input" placeholder="Digite um nome...">
            <button onclick="adicionarNome()" id="btn-add">Adicionar</button>
        </div>

        <ul id="lista-convidados"></ul>
        
        <div id="contagem-a">Nomes com 'A': <span>0</span></div>
        <button onclick="limparLista()" id="btn-clear">Limpar Tudo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
