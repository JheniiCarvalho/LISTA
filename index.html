<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest List Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1><i class="fa-solid fa-users"></i> Convidados</h1>
        </header>
        
        <div class="input-group">
            <input type="text" id="nome-input" placeholder="Ex: Amanda Silva...">
            <button onclick="adicionarNome()" id="btn-add">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>

        <button onclick="mostrarLista()" id="btn-show">
            <i class="fa-solid fa-eye"></i> Gerar Lista Processada
        </button>

        <ul id="lista-convidados"></ul>
        
        <div id="resultado-area" class="hidden">
            <div class="stats">
                <p id="contagem-a">Nomes com 'A': <span>0</span></p>
                <p id="total-geral">Total: <span>0</span></p>
            </div>
            <button onclick="limparTudo()" id="btn-clear">
                <i class="fa-solid fa-trash-can"></i> Limpar Tudo
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
